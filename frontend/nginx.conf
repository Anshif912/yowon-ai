# Rate limiting zone definition
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Client limits (allow large file uploads for repos/zips)
    client_max_body_size 100M;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none';" always;

    # Frontend Assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Backend API Proxy with rate limiting
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        # Strip /api prefix if backend doesn't expect it, but wait!
        # Let's check: does backend expect /api prefix?
        # Let's check how backend main.py routes are defined: e.g., @app.get("/projects")
        # Yes! FastAPI router doesn't prefix /api by default unless declared. Let's rewrite /api/(.*) to /$1!
        rewrite ^/api/(.*)$ /$1 break;
        
        # Fallback rewrite for bare /api or /api/
        rewrite ^/api$ / break;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # Nginx / Container Health Check
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"frontend-nginx"}';
    }
}
